```toml
[variables]
NODE_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[phases.setup]
nixPkgs = [
  "nodejs_22",
  "chromium",
  "ffmpeg",
  "nss",
  "atk",
  "at-spi2-atk",
  "cups",
  "gtk3",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXrandr",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libxcb",
  "xorg.libxkbcommon",
  "alsa-lib"
]

[phases.install]
cmds = [
  "npm install"
]

[start]
cmd = "node server.js"
```
